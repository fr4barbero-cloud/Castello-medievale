<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Castello Medievale Interattivo</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #e8e3d8;
      color: #2d2418;
      overflow: hidden;
    }

    .app {
      display: grid;
      grid-template-columns: 320px 1fr;
      height: 100vh;
      width: 100vw;
    }

    .sidebar {
      background: linear-gradient(180deg, #5a4631 0%, #3f3122 100%);
      color: #fff8eb;
      padding: 28px 22px;
      box-shadow: 4px 0 18px rgba(0,0,0,.18);
      z-index: 5;
      position: relative;
    }

    .sidebar h1 {
      margin: 0 0 10px;
      font-size: 30px;
      line-height: 1.1;
      letter-spacing: 1px;
    }

    .sidebar p {
      margin: 0 0 22px;
      font-size: 14px;
      line-height: 1.5;
      color: #f0e4cf;
    }

    .menu {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .menu button, .actions button {
      appearance: none;
      border: none;
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: transform .18s ease, box-shadow .18s ease, background .18s ease;
    }

    .menu button {
      background: #f1dcc0;
      color: #3f3122;
      text-align: left;
      box-shadow: 0 6px 12px rgba(0,0,0,.16);
    }

    .menu button:hover, .menu button.active {
      transform: translateY(-2px);
      background: #ffd498;
    }

    .actions {
      margin-top: 18px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .actions button {
      background: #8f6d4c;
      color: white;
    }

    .actions button:hover {
      background: #a8825a;
    }

    .viewer-wrap {
      position: relative;
      overflow: hidden;
      background: #d8d4cf;
    }

    .viewer {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }

    .scene {
      position: absolute;
      inset: 0;
      background-image: url("castello.png.png");
      background-repeat: no-repeat;
      background-position: center center;
      background-size: contain;
      transform-origin: center center;
      transform: translate(0px, 0px) scale(1);
      transition: transform 700ms cubic-bezier(.2,.8,.2,1);
      cursor: grab;
      will-change: transform;
    }

    
    .marker {
      position: absolute;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: rgba(180, 52, 37, 0.92);
      border: 2px solid #fff;
      box-shadow: 0 0 0 6px rgba(180, 52, 37, .18);
      transform: translate(-50%, -50%);
      z-index: 2;
      cursor: pointer;
      transition: transform .2s ease;
    }

    .marker:hover { transform: translate(-50%, -50%) scale(1.12); }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(16, 12, 8, 0.28);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 22px;
      z-index: 20;
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
    }

    .modal-backdrop.show { display: flex; align-items: center; justify-content: center; }

    .modal {
      margin: auto;
      width: min(1100px, 94vw);
      max-height: min(86vh, 760px);
      overflow: hidden;
      border-radius: 22px;
      box-shadow: 0 20px 40px rgba(0,0,0,.22);
      padding: 14px;
      border: 1px solid rgba(255,255,255,.35);
      background: rgba(255, 250, 242, 0.38);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    
      display: flex;
      flex-direction: column;
    }

    .modal-top {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 10px;
    }

    .modal h2 {
      margin: 0;
      font-size: 30px;
      color: #3f3122;
      text-shadow: 0 1px 0 rgba(255,255,255,.5);
    }


    .modal-header-left {
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-width: 0;
    }

    .title-audio-row {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .audio-controls {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .audio-controls button {
      background: rgba(90, 70, 49, 0.82);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 8px 12px;
      font-weight: 700;
      cursor: pointer;
      transition: background .18s ease, transform .18s ease;
    }

    .audio-controls button:hover {
      background: #a8825a;
      transform: translateY(-1px);
    }

    .audio-controls button.active {
      background: #b43c2d;
    }

    @media (max-width: 980px) {
      .title-audio-row {
        align-items: flex-start;
      }

      .audio-controls button {
        font-size: 14px;
        padding: 8px 10px;
      }
    }

    .close-btn {
      background: rgba(90, 70, 49, 0.82);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 8px 10px;
      font-weight: bold;
      cursor: pointer;
    }

    .tag {
      display: inline-block;
      background: rgba(236, 215, 186, 0.78);
      color: #5a4631;
      padding: 6px 10px;
      border-radius: 999px;
      margin-bottom: 10px;
      font-size: 13px;
      font-weight: 700;
      border: 1px solid rgba(90,70,49,.18);
    }

    .modal-grid {
      display: grid;
      grid-template-columns: 1fr 1fr; direction: rtl;
      gap: 18px;
      align-items: stretch;
      min-height: 0;
    
      flex: 1;
      height: calc(min(86vh, 760px) - 120px);
    }

    .panel { direction: ltr;
      background: rgba(255,255,255,0.18);
      border: 1px solid rgba(255,255,255,0.32);
      border-radius: 18px;
      padding: 14px;
      backdrop-filter: blur(4px);
      display: flex;
      flex-direction: column;
      -webkit-backdrop-filter: blur(4px);
      min-height: 0;
    }

    .panel h3 {
      margin: 0 0 8px;
      font-size: 17px;
      color: #4b3826;
    }

    .flip-card-wrap {
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: center;
      justify-content: center;
      height: 100%;
    }

    .flip-note {
      font-size: 14px;
      color: #4b3826;
      text-align: center;
      background: rgba(255,255,255,.28);
      border-radius: 12px;
      padding: 8px 10px;
      max-width: 320px;
    }

    .flip-card {
      width: min(100%, 420px);
      aspect-ratio: 4 / 4.6;
      perspective: 1200px;
      cursor: pointer;
    }

    .flip-card-inner {
      width: 100%;
      height: 100%;
      position: relative;
      transition: transform .8s ease;
      transform-style: preserve-3d;
    }

    .flip-card.flipped .flip-card-inner {
      transform: rotateY(180deg);
    }

    .flip-face {
      position: absolute;
      inset: 0;
      border-radius: 18px;
      backface-visibility: hidden;
      overflow: hidden;
      border: 1px solid rgba(90,70,49,.2);
      box-shadow: 0 10px 24px rgba(0,0,0,.14);
      background-size: contain;
      background-position: center center;
      background-repeat: no-repeat;
      background-color: rgba(255,255,255,.35);
    }

    .flip-front {
      background-image: linear-gradient(rgba(255,255,255,.08), rgba(255,255,255,.08)), url("castello.png.png");
    }

    .flip-back {
      transform: rotateY(180deg);
      background-image: linear-gradient(rgba(255,255,255,.08), rgba(255,255,255,.08)), url("castello.png.png");
    }

    .face-label {
      position: absolute;
      left: 12px;
      bottom: 12px;
      background: rgba(48,36,22,.74);
      color: #fff5e7;
      border-radius: 12px;
      padding: 8px 10px;
      font-weight: 700;
      font-size: 14px;
    }

    .text-box {
      width: 100%;
      height: 100%;
      flex: 1;
      min-height: 0;
      resize: none;
      border-radius: 16px;
      border: 1px solid rgba(90,70,49,.18);
      padding: 16px;
      font-size: 19px;
      line-height: 1.55;
      font-weight: 500;
      background: rgba(255,255,255,.42);
      color: #2d2418;
      outline: none;
    }

    .text-box:focus {
      border-color: rgba(90,70,49,.45);
      box-shadow: 0 0 0 3px rgba(255,255,255,.2);
    }

    .question-line {
      font-size: 24px;
      line-height: 1.25;
      margin: 0 0 8px 0;
      color: #3b2b1f;
      font-weight: 800;
    }

    .answer-line {
      font-size: 19px;
      line-height: 1.5;
      margin: 0 0 14px 0;
      color: #2d2418;
    }

    @media (max-width: 980px) {
      body { overflow: auto; }
      .app {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr;
      }
      .sidebar {
        padding: 14px;
      }
      .sidebar h1 { font-size: 24px; }
      .viewer-wrap { min-height: 58vh; }
        </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <h1>CASTELLO MEDIEVALE</h1>
      <p>Seleziona uno dei 6 ambienti per ingrandire l’area corrispondente e aprire una finestra trasparente con card e spazio testo.</p>
      <div class="menu" id="menu"></div>
      <div class="actions">
        <button id="resetView">Vista completa</button>
      </div>
    </aside>

    <main class="viewer-wrap">
      <div class="viewer">
        <div class="scene" id="scene"></div>
</div>
    </main>
  </div>

  <div class="modal-backdrop" id="modalBackdrop">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-top">
        <div class="modal-header-left">
          <div class="tag" id="modalTag">Ambiente del castello</div>
          <div class="title-audio-row">
            <h2 id="modalTitle">Titolo</h2>
            <div class="audio-controls">
              <button id="audioTesto" type="button" aria-label="Ascolta il testo della finestra" title="Ascolta il testo della finestra">🔊 Testo</button>
              <button id="audioPersonaggi" type="button" aria-label="Ascolta i personaggi" title="Ascolta i personaggi">🔊 Personaggi</button>
            </div>
          </div>
        </div>
        <button class="close-btn" id="closeModal">Chiudi</button>
      </div>

      <div class="modal-grid">
        <section class="panel">
          
          <div class="flip-card-wrap"><div style="font-weight:700; margin-bottom:8px; text-align:center;">Clicca sull'immagine per ruotare la card</div>
            <div class="flip-card" id="flipCard" aria-label="Card interattiva">
              <div class="flip-card-inner">
                <div class="flip-face flip-front" id="cardFront">
                  <div class="face-label">FRONTE</div>
                </div>
                <div class="flip-face flip-back" id="cardBack">
                  <div class="face-label">RETRO</div>
                </div>
              </div>
            </div>
            <div class="flip-note"></div>
          </div>
        </section>

        <section class="panel">
          
          <div class="text-box" id="textBox"></div>
        </section>
      </div>
    </div>
  </div>

  
  <script>
    const locations = {
      cappella: {
        label: "CAPPELLA",
        originX: 24,
        originY: 39,
        scale: 2.35,
        frontImage: "cappella.png",
        backImage: "monacocastello.png",
        frontLabel: "FRONTE - CAPPELLA",
        backLabel: "RETRO - CAPPELLA"
      ,
        text: `DOV’E’?
all’interno delle mura del castello, vicino alla residenza dei signori

A COSA SERVE?
è la sede dei riti religiosi, sacramenti e la sede dell'archivio per i documenti importanti

COME E’ FATTO?
Di pietra con l'altare al centro. Ci sono affreschi e vetrate colorate nei castelli più ricchi`
      },
      mura: {
        label: "MURA",
        originX: 60,
        originY: 55,
        scale: 3.0,
        frontImage: "mura.png",
        backImage: "soldatocastello.png",
        frontLabel: "FRONTE - MURA",
        backLabel: "RETRO - MURA"
      ,
        text: `DOV’E’?
circondano il castello

A COSA SERVE?
servono per proteggere il castello in caso di attacco

COME E’ FATTO?
circondato da un FOSSATO, superabile grazie a un PONTE LEVATOIO. Sopra le mura c'è un camminamento per i soldati che si nascondono dietro ai MERLI e lanciano frecce dalle FERITOIE`
      },
      magazzino: {
        label: "MAGAZZINO",
        originX: 53,
        originY: 34,
        scale: 3.0,
        frontImage: "magazzino.png",
        backImage: "contadinimedievali.png",
        frontLabel: "FRONTE - MAGAZZINO",
        backLabel: "RETRO - MAGAZZINO"
      ,
        text: `DOV'E'?
dentro il castello

COME E' FATTO?
luogo chiuso e protetto

A COSA SERVE?
conservare cibo, nutrire la popolazione, resistere agli assedi`
      },
      mastio: {
        label: "MASTIO",
        originX: 86,
        originY: 14,
        scale: 3.2,
        frontImage: "mastio.png",
        backImage: "signoricastello.png",
        frontLabel: "FRONTE - MASTIO",
        backLabel: "RETRO - MASTIO"
      ,
        text: `DOV'E'?
all'interno del castello

COME E' FATTO?
di pietra, in caso di attacco viene eliminato ogni accesso al mastio per difendersi. Contiene gli alloggi del signore del castello e delle scorte di cibo in caso di assedio

A COSA SERVE?
è l'ultima difesa del castello in cui si rifugia il Signore e la sua famiglia.`
      },
      salaGrande: {
        label: "SALA GRANDE",
        originX: 86,
        originY: 60,
        scale: 3.0,
        frontImage: "salagrande.png",
        backImage: "cavalierimedievali.png",
        frontLabel: "FRONTE - SALA GRANDE",
        backLabel: "RETRO - SALA GRANDE"
      ,
        text: `DOV’E’?
all’interno delle mura del castello

A COSA SERVE?
è il luogo delle feste e delle riunioni importanti

COME E’ FATTO?
Un grande camino scalda la stanza, c’è un palco su cui siedono i Signori del castello. Ci sono tavoli per i banchetti e arazzi sulle pareti per tenere la sala calda`
      ,
        text: `DOV’E’?
all’interno delle mura del castello

A COSA SERVE?
è il luogo delle feste e delle riunioni importanti

COME E’ FATTO?
Un grande camino scalda la stanza, c’è un palco su cui siedono i Signori del castello. Ci sono tavoli per i banchetti e arazzi sulle pareti per tenere la sala calda`
      },
      cortile: {
        label: "CORTILE",
        originX: 22,
        originY: 72,
        scale: 2.8,
        frontImage: "cortile.png",
        backImage: "servicastello.png",
        frontLabel: "FRONTE - CORTILE",
        backLabel: "RETRO - CORTILE"
      ,
        text: `DOV’E’?
all’interno delle mura del castello, pavimentato con pietre o in terra battuta

A COSA SERVE?
durante tempi di pace è la sede del mercato e di botteghe. Durante gli assedi accoglie i contadini in fuga dai villaggi

COME E’ FATTO?
contiene sempre un POZZO per avere sempre acqua. Ci sono botteghe e stalle`
      }
    };

    const menu = document.getElementById('menu');
    const scene = document.getElementById('scene');
    const viewer = document.querySelector('.viewer');
    const modalBackdrop = document.getElementById('modalBackdrop');
    const modalTitle = document.getElementById('modalTitle');
    const modalTag = document.getElementById('modalTag');
    const closeModal = document.getElementById('closeModal');
    const resetView = document.getElementById('resetView');
    const flipCard = document.getElementById('flipCard');
    const cardFront = document.getElementById('cardFront');
    const cardBack = document.getElementById('cardBack');
    const frontLabel = document.querySelector('#cardFront .face-label');
    const backLabel = document.querySelector('#cardBack .face-label');
    const textBox = document.getElementById('textBox');


    let audioTesto = new Audio();
    let audioPersonaggi = new Audio();
    let currentAudio = null;

    const audioMap = {
      cappella: {
        testo: "cappella_testo.mp3",
        personaggi: "cappella_personaggi.mp3"
      },
      mura: {
        testo: "mura_testo.mp3",
        personaggi: "mura_personaggi.mp3"
      },
      magazzino: {
        testo: "magazzino_testo.mp3",
        personaggi: "magazzino_personaggi.mp3"
      },
      mastio: {
        testo: "mastio_testo.mp3",
        personaggi: "mastio_personaggi.mp3"
      },
      salaGrande: {
        testo: "sala_testo.mp3",
        personaggi: "sala_personaggi.mp3"
      },
      cortile: {
        testo: "cotile_testo.mp3",
        personaggi: "cortile_personaggi.mp3"
      }
    };

    const btnTesto = document.getElementById('audioTesto');
    const btnPersonaggi = document.getElementById('audioPersonaggi');

    function resetAudioButtons() {
      btnTesto.classList.remove('active');
      btnPersonaggi.classList.remove('active');
      currentAudio = null;
    }

    function stopAllAudio() {
      audioTesto.pause();
      audioTesto.currentTime = 0;
      audioPersonaggi.pause();
      audioPersonaggi.currentTime = 0;
      resetAudioButtons();
    }

    function playSelectedAudio(type) {
      if (!currentKey || !audioMap[currentKey]) return;

      const file = audioMap[currentKey][type];
      if (!file) return;

      if (currentAudio === type) {
        stopAllAudio();
        return;
      }

      stopAllAudio();

      const targetAudio = type === 'testo' ? audioTesto : audioPersonaggi;
      const targetButton = type === 'testo' ? btnTesto : btnPersonaggi;

      targetAudio.src = file;
      targetAudio.load();

      const playPromise = targetAudio.play();
      if (playPromise !== undefined) {
        playPromise.then(() => {
          targetButton.classList.add('active');
          currentAudio = type;
        }).catch((err) => {
          console.error('Errore audio:', err);
          alert('Audio non trovato o non caricato. Controlla che il file MP3 sia nella stessa cartella dell\'HTML.');
          stopAllAudio();
        });
      }
    }

    btnTesto.addEventListener('click', () => playSelectedAudio('testo'));
    btnPersonaggi.addEventListener('click', () => playSelectedAudio('personaggi'));

    audioTesto.addEventListener('ended', resetAudioButtons);
    audioPersonaggi.addEventListener('ended', resetAudioButtons);

    const savedTexts = {};
    let currentKey = null;

    let currentScale = 1;
    let translateX = 0;
    let translateY = 0;
    let isDragging = false;
    let dragMoved = false;
    let startX = 0;
    let startY = 0;

    function applyTransform(animated = true) {
      scene.style.transition = animated ? 'transform 700ms cubic-bezier(.2,.8,.2,1)' : 'none';
      scene.style.transform = `translate(${translateX}px, ${translateY}px) scale(${currentScale})`;
    }

    function renderMenu() {
      Object.entries(locations).forEach(([key, item]) => {
        const btn = document.createElement('button');
        btn.textContent = item.label;
        btn.dataset.key = key;
        btn.addEventListener('click', () => focusLocation(key));
        menu.appendChild(btn);
      });
    }

    function formatText(rawText) {
      if (!rawText) return "";
      const lines = rawText.split(/\n+/).map(line => line.trim()).filter(Boolean);
      return lines.map(line => {
        const upper = line.toUpperCase();
        if (upper === "DOV'E'?" || upper === "DOV’E’?" || upper === "A COSA SERVE?" || upper === "COME E' FATTO?" || upper === "COME E’ FATTO?" || upper === "MASTIO") {
          return `<div class="question-line"><strong>${line}</strong></div>`;
        }
        return `<div class="answer-line">${line}</div>`;
      }).join("");
    }

    function setActiveButton(key) {
      document.querySelectorAll('.menu button').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.key === key);
      });
    }

    function focusLocation(key) {
      const item = locations[key];
      if (!item) return;

      stopAllAudio();
      currentKey = key;

      const rect = viewer.getBoundingClientRect();
      const centerX = rect.width / 2;
      const centerY = rect.height / 2;

      const pointX = rect.width * (item.originX / 100);
      const pointY = rect.height * (item.originY / 100);

      currentScale = item.scale;
      translateX = centerX - pointX;
      translateY = centerY - pointY;

      applyTransform(true);

      modalTag.textContent = "Ambiente del castello";
      modalTitle.textContent = item.label;
      cardFront.style.backgroundImage = `linear-gradient(rgba(255,255,255,.08), rgba(255,255,255,.08)), url("${item.frontImage}")`;
      cardBack.style.backgroundImage = `linear-gradient(rgba(255,255,255,.08), rgba(255,255,255,.08)), url("${item.backImage}")`;
      frontLabel.textContent = item.frontLabel;
      backLabel.textContent = item.backLabel;
      textBox.innerHTML = formatText(savedTexts[key] || item.text || "");
      flipCard.classList.remove('flipped');
      modalBackdrop.classList.add('show');
      setActiveButton(key);
    }

    function resetScene() {
      currentScale = 1;
      translateX = 0;
      translateY = 0;
      applyTransform(true);
      modalBackdrop.classList.remove('show');
      flipCard.classList.remove('flipped');
      setActiveButton(null);
    }


    flipCard.addEventListener('click', () => {
      if (!dragMoved) flipCard.classList.toggle('flipped');
    });

    closeModal.addEventListener('click', () => { stopAllAudio(); modalBackdrop.classList.remove('show'); });
    modalBackdrop.addEventListener('click', (e) => {
      if (e.target === modalBackdrop) { stopAllAudio(); modalBackdrop.classList.remove('show'); }
    });
    resetView.addEventListener('click', () => { stopAllAudio(); resetScene(); });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') { stopAllAudio(); modalBackdrop.classList.remove('show'); }
    });

    scene.addEventListener('mousedown', (e) => {
      isDragging = true;
      dragMoved = false;
      startX = e.clientX - translateX;
      startY = e.clientY - translateY;
      scene.style.cursor = 'grabbing';
      scene.style.transition = 'none';
    });

    window.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      const nextX = e.clientX - startX;
      const nextY = e.clientY - startY;
      if (Math.abs(nextX - translateX) > 2 || Math.abs(nextY - translateY) > 2) {
        dragMoved = true;
      }
      translateX = nextX;
      translateY = nextY;
      applyTransform(false);
    });

    window.addEventListener('mouseup', () => {
      if (!isDragging) return;
      isDragging = false;
      scene.style.cursor = 'grab';
      setTimeout(() => dragMoved = false, 0);
    });

    scene.addEventListener('mouseleave', () => {
      if (!isDragging) scene.style.cursor = 'grab';
    });

    viewer.addEventListener('wheel', (e) => {
      e.preventDefault();
      const rect = viewer.getBoundingClientRect();

      const mouseX = e.clientX - rect.left;
      const mouseY = e.clientY - rect.top;

      const worldX = (mouseX - translateX) / currentScale;
      const worldY = (mouseY - translateY) / currentScale;

      const zoomFactor = e.deltaY < 0 ? 1.12 : 0.9;
      const nextScale = Math.max(1, Math.min(4, currentScale * zoomFactor));

      translateX = mouseX - worldX * nextScale;
      translateY = mouseY - worldY * nextScale;
      currentScale = nextScale;

      applyTransform(false);
    }, { passive: false });

    window.addEventListener('resize', () => {
      applyTransform(false);
    });

    renderMenu();
    applyTransform(false);
  </script>

</body>
</html>
